name: Run Prisma Migrations

on:
  push:
    branches:
      - main
      - deploy/ai-features
      - ci/prisma-migrate

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # sanity checks to provide clear failure message if secrets are missing
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set or empty. Add it in GitHub repo Settings -> Secrets -> Actions." >&2
            exit 1
          fi
          if [ -z "$DIRECT_URL" ]; then
            echo "ERROR: DIRECT_URL is empty; setting it from DATABASE_URL" >&2
            export DIRECT_URL="$DATABASE_URL"
          fi
          cd backend
          echo "Running prisma migrate deploy..."
          npx prisma migrate deploy
          npx prisma generate
